name: Monday.com to Google Sheets Sync

on:
  # Trigger manually from GitHub Actions UI
  workflow_dispatch:
  # Uncomment to enable scheduled runs (uses cron syntax, UTC):
  # schedule:
  #   - cron: '0 */4 * * *'   # every 4 hours

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL
        env:
          MONDAY_KEY:                ${{ secrets.MONDAY_KEY }}
          MONDAY_BOARD_ID:           ${{ secrets.MONDAY_BOARD_ID }}
          MONDAY_COL_PROJECTS:       ${{ secrets.MONDAY_COL_PROJECTS }}
          MONDAY_COL_TIME_TRACKING:  ${{ secrets.MONDAY_COL_TIME_TRACKING }}
          MONDAY_COL_PEOPLE:         ${{ secrets.MONDAY_COL_PEOPLE }}
          MONDAY_COL_STATUS:         ${{ secrets.MONDAY_COL_STATUS }}
          MONDAY_COL_PRIORITY:       ${{ secrets.MONDAY_COL_PRIORITY }}
          MONDAY_COL_EST_DURATION:   ${{ secrets.MONDAY_COL_EST_DURATION }}
          MONDAY_COL_TIMELINE:       ${{ secrets.MONDAY_COL_TIMELINE }}
          MONDAY_COL_MODULE:         ${{ secrets.MONDAY_COL_MODULE }}
          MONDAY_COL_SPECIALTY:      ${{ secrets.MONDAY_COL_SPECIALTY }}
          MONDAY_COL_COMMENTS:       ${{ secrets.MONDAY_COL_COMMENTS }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEET_ID:           ${{ secrets.GOOGLE_SHEET_ID }}
        run: python etl.py
